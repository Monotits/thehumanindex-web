<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 42" fill="none">
  <!-- Hourglass: top bar aligns with THE baseline, bottom bar aligns with HUMAN INDEX baseline -->
  <g transform="translate(2, 5)">
    <!-- Top bar -->
    <rect x="0" y="0" width="24" height="2" rx="1" fill="white"/>
    <!-- Bottom bar -->
    <rect x="0" y="30" width="24" height="2" rx="1" fill="white"/>
    <!-- Top glass -->
    <path d="M 1.5 3 Q 12 15, 12 16" stroke="white" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path d="M 22.5 3 Q 12 15, 12 16" stroke="white" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <!-- Bottom glass -->
    <path d="M 1.5 29 Q 12 17, 12 16" stroke="white" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path d="M 22.5 29 Q 12 17, 12 16" stroke="white" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <!-- Sand -->
    <path d="M 6.5 29 L 17.5 29 L 12 22 Z" fill="white" opacity="0.25"/>
  </g>
  <!-- THE: y=11 means baseline at 11 -->
  <text x="36" y="11" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="500" letter-spacing="3" fill="rgba(255,255,255,0.6)">THE</text>
  <!-- HUMAN INDEX: y=37 means baseline at 37 -->
  <text x="36" y="37" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="700" letter-spacing="1" fill="white">HUMAN INDEX</text>
</svg>
