<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 46" fill="none">
  <!-- Hourglass icon — rounded corners, clean geometry -->
  <g transform="translate(0, 3)">
    <!-- Top bar (rounded) -->
    <rect x="2" y="0" width="30" height="3" rx="1.5" fill="white"/>
    <!-- Bottom bar (rounded) -->
    <rect x="2" y="37" width="30" height="3" rx="1.5" fill="white"/>
    <!-- Top triangle (glass) -->
    <path d="M 5 4 C 5 4, 17 17, 17 19 C 17 17, 29 4, 29 4" stroke="white" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Bottom triangle (glass) -->
    <path d="M 5 36 C 5 36, 17 23, 17 21 C 17 23, 29 36, 29 36" stroke="white" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Sand in bottom -->
    <path d="M 10 36 L 24 36 L 17 28 Z" fill="white" opacity="0.3"/>
    <!-- Narrow stream -->
    <line x1="17" y1="18" x2="17" y2="22" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- Text -->
  <text x="44" y="13" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="500" letter-spacing="3" fill="rgba(255,255,255,0.6)">THE</text>
  <text x="44" y="40" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="700" letter-spacing="1" fill="white">HUMAN INDEX</text>
</svg>
